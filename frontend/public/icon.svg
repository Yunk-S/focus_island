<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FDBDA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B794F4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" filter="url(#glow)"/>
  
  <!-- Island shape -->
  <path d="M128 340 Q180 300 256 310 Q332 320 384 340 Q350 370 256 385 Q162 400 128 340" fill="#68D391"/>
  <path d="M128 340 Q180 300 256 310 Q332 320 384 340 Q350 370 256 385 Q162 400 128 340" fill="url(#grad1)" opacity="0.3"/>
  
  <!-- Palm tree -->
  <g transform="translate(256, 310)">
    <path d="M0 0 Q5 -40 25 -70" stroke="#8B7355" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="-75" rx="35" ry="12" fill="#2D5A27" transform="rotate(-30 30 -75)"/>
    <ellipse cx="15" cy="-70" rx="30" ry="10" fill="#3D7A37" transform="rotate(30 15 -70)"/>
  </g>
  
  <!-- House -->
  <g transform="translate(190, 300)">
    <rect x="0" y="20" width="50" height="40" rx="4" fill="#F7FAFC"/>
    <polygon points="-10,20 25,-5 60,20" fill="#FC8181"/>
    <rect x="18" y="35" width="12" height="25" rx="2" fill="#4A5568"/>
    <rect x="5" y="28" width="10" height="10" rx="1" fill="#7FDBDA"/>
  </g>
  
  <!-- Sun -->
  <circle cx="380" cy="120" r="35" fill="#F6E05E" opacity="0.9"/>
  
  <!-- Star decorations -->
  <circle cx="150" cy="150" r="4" fill="#F6E05E"/>
  <circle cx="420" cy="200" r="3" fill="#F6E05E"/>
  <circle cx="100" cy="220" r="3" fill="#F6E05E"/>
</svg>
